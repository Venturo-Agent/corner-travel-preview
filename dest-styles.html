<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>六國各自的風格 · 對照樣張 · 角落 CORNER</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400;1,500&family=Noto+Serif+TC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="corner.css">
<style>
  .head{padding:140px 0 24px}
  .head h1{font-family:"Cormorant Garamond",serif;font-weight:400;font-size:clamp(38px,4.6vw,60px);color:var(--ink);line-height:1}
  .head .cn{display:block;font-family:"Noto Serif TC",serif;font-weight:500;font-size:22px;color:var(--gold);margin-top:12px;letter-spacing:.06em}
  .head .lead{margin-top:16px;font-size:17px;color:var(--ink-dim);max-width:40em;line-height:1.85}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:28px;padding:24px 0 100px}

  .dcard{position:relative;height:560px;overflow:hidden;cursor:pointer}
  .dcard>img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:saturate(.92) contrast(1.04) brightness(.9) sepia(.04);transition:transform 1.5s var(--ease-expo)}
  .dcard:hover>img{transform:scale(1.05)}
  /* 國別「紙帶」：半透明色 + 鏤空刀工 + 漸層淡出 */
  .band{position:absolute;left:0;right:0;bottom:0;height:64%;z-index:2;pointer-events:none}
  .band .wash{position:absolute;inset:0}
  .band .motif{position:absolute;inset:0;width:100%;height:100%;
    -webkit-mask-image:linear-gradient(0deg,#000 18%,rgba(0,0,0,.5) 52%,transparent 100%);
    mask-image:linear-gradient(0deg,#000 18%,rgba(0,0,0,.5) 52%,transparent 100%)}
  .dname{position:absolute;left:34px;bottom:34px;z-index:3}
  .dname .en{font-family:"Cormorant Garamond",serif;font-weight:500;text-transform:uppercase;letter-spacing:.24em;font-size:13px;margin-bottom:6px;display:block}
  .dname h3{font-family:"Noto Serif TC",serif;font-weight:600;font-size:34px;color:#fff;letter-spacing:.08em;text-shadow:0 2px 14px rgba(0,0,0,.5)}
  .dname .sub{display:block;margin-top:6px;font-size:14px;letter-spacing:.06em}

  /* 日本：靛藍 + 七寶（圓相扣） */
  .jp .wash{background:linear-gradient(0deg, rgba(28,46,74,.82) 0%, rgba(28,46,74,.45) 45%, transparent 100%)}
  .jp .en{color:#BFD0E8}.jp .sub{color:#C9D6E8}
  /* 中國：朱紅 + 冰裂窗花 */
  .cn .wash{background:linear-gradient(0deg, rgba(140,32,32,.84) 0%, rgba(140,32,32,.46) 45%, transparent 100%)}
  .cn .en{color:#F3C9B4}.cn .sub{color:#F2D2C2}

  @media(max-width:860px){.row{grid-template-columns:1fr}}
</style>
</head>
<body>

<svg width="0" height="0" aria-hidden="true" style="position:absolute"><defs>
  <!-- 日本 七寶（shippō）：相扣圓，淺白線 -->
  <pattern id="shippo" width="44" height="44" patternUnits="userSpaceOnUse">
    <g fill="none" stroke="#E7EEF8" stroke-width="1.5" opacity=".9">
      <circle cx="22" cy="22" r="22"/><circle cx="0" cy="22" r="22"/><circle cx="44" cy="22" r="22"/>
      <circle cx="22" cy="0" r="22"/><circle cx="22" cy="44" r="22"/>
    </g>
    <g fill="#E7EEF8" opacity=".9"><circle cx="22" cy="22" r="2"/><circle cx="0" cy="0" r="1.6"/><circle cx="44" cy="0" r="1.6"/><circle cx="0" cy="44" r="1.6"/><circle cx="44" cy="44" r="1.6"/></g>
  </pattern>
  <!-- 中國 冰裂窗花：不規則折線格，奶白線 -->
  <pattern id="binglie" width="78" height="78" patternUnits="userSpaceOnUse">
    <g fill="none" stroke="#FBE7D6" stroke-width="1.5" opacity=".92">
      <path d="M0 26 L26 14 L52 30 L78 18"/>
      <path d="M0 56 L22 46 L50 60 L78 50"/>
      <path d="M14 0 L26 14 L18 40 L40 52 L34 78"/>
      <path d="M50 0 L52 30 L74 40 L66 78"/>
      <path d="M26 14 L40 52 M52 30 L22 46 M50 60 L74 40"/>
    </g>
    <g fill="#FBE7D6" opacity=".9"><circle cx="26" cy="14" r="2"/><circle cx="52" cy="30" r="2"/><circle cx="40" cy="52" r="2"/><circle cx="22" cy="46" r="1.8"/><circle cx="50" cy="60" r="1.8"/></g>
  </pattern>
</defs></svg>

<nav id="nav">
  <a href="index.html" class="logo"><span class="mark">角</span><span class="cn2">落</span><span class="dot">·</span><span class="en">Corner</span></a>

</nav>

<header class="head">
  <div class="wrap">
    <div class="kicker">ONE STYLE PER LAND<span class="sep"></span><span class="cn">一國一風格</span></div>
    <h1 style="margin-top:16px">A different soul for each land<span class="cn">六個國度，六種刀工</span></h1>
    <p class="lead">同一套版型，換上各國自己的文化紋樣與色調——日本的靛藍七寶、中國的朱紅冰裂窗花。這只是兩個樣板，給你感受「一國一風格」的概念。</p>
  </div>
</header>

<section class="wrap">
  <div class="row">
    <article class="dcard jp">
      <img src="assets/photos/kyoto-temple.jpg" alt="日本">
      <div class="band"><div class="wash"></div><svg class="motif"><rect width="100%" height="100%" fill="url(#shippo)"/></svg></div>
      <div class="dname"><span class="en">Japan</span><h3>日本</h3><span class="sub">靛藍・七寶相扣的四季</span></div>
    </article>
    <article class="dcard cn">
      <img src="assets/photos/china-scenic.jpg" alt="中國">
      <div class="band"><div class="wash"></div><svg class="motif"><rect width="100%" height="100%" fill="url(#binglie)"/></svg></div>
      <div class="dname"><span class="en">China</span><h3>中國</h3><span class="sub">朱紅・冰裂窗花的山水</span></div>
    </article>
  </div>
</section>

<script src="corner.js"></script>
</body>
</html>
